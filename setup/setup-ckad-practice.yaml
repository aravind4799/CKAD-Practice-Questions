# ==============================================================================
# QUESTION 16: Add Resource Requests and Limits to Pod
# Description: Pod exists with no resources configured.
# ==============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: q16
---
# Added ResourceQuota to simulate the scenario requirements
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-quota
  namespace: q16
spec:
  hard:
    limits.cpu: "500m"
    limits.memory: "512Mi"
---
apiVersion: v1
kind: Pod
metadata:
  name: resource-pod
  namespace: q16
spec:
  containers:
  - name: compute-container
    image: nginx:latest # Updated from redis:alpine to nginx:latest per instructions
    resources:
      requests:
        cpu: "100m"      # Meets the "at least 100m" requirement
        memory: "128Mi"  # Meets the "at least 128Mi" requirement
      limits:
        cpu: "250m"      # Exactly half of the 500m ResourceQuota limit
        memory: "256Mi"  # Exactly half of the 512Mi ResourceQuota limit