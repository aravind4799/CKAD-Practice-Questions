# ==============================================================================
# QUESTION 6: Create Canary Deployment with Manual Traffic Split
# Description: Deployment 'web-app' exists with 5 replicas (v1) and service 'web-service'.
# ==============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: q6
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: q6
spec:
  replicas: 5
  selector:
    matchLabels:
      app: webapp
      version: v1
  template:
    metadata:
      labels:
        app: webapp
        version: v1
  template:
    metadata:
      labels:
        app: webapp
        version: v1
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: q6
spec:
  selector:
    app: webapp
  ports:
  - port: 80
    targetPort: 80

