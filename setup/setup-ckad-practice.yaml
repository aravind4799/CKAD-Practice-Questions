# ==============================================================================
# QUESTION 3: Create ServiceAccount, Role, and RoleBinding from Logs Error
# Description: Pod 'log-collector' exists but fails due to authorization.
# ==============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: q3
---
apiVersion: v1
kind: Pod
metadata:
  name: log-collector
  namespace: q3
spec:
  containers:
  - name: collector
    image: busybox:latest
    command: ["/bin/sh", "-c"]
    # Simulation: Continuously prints authorization errors into its log stream
    args:
    - while true; do
        echo 'User "system:serviceaccount:q3:default" cannot list pods in the namespace "q3"';
        sleep 5;
      done

---
# ==============================================================================
# QUESTION 4: Fix Broken Pod with Correct ServiceAccount
# Description: Pod 'metrics-pod' uses 'wrong-sa' and fails.
# ==============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: q4
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitor-sa
  namespace: q4
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wrong-sa
  namespace: q4
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-sa
  namespace: q4
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: metrics-reader
  namespace: q4
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: full-access
  namespace: q4
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: view-only
  namespace: q4
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitor-binding
  namespace: q4
subjects:
- kind: ServiceAccount
  name: monitor-sa
  namespace: q4
roleRef:
  kind: Role
  name: metrics-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-binding
  namespace: q4
subjects:
- kind: ServiceAccount
  name: admin-sa
  namespace: q4
roleRef:
  kind: Role
  name: full-access
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: metrics-pod
  namespace: q4
spec:
  serviceAccountName: wrong-sa
  containers:
  - name: metrics-collector
    image: busybox:latest
    command: ["/bin/sh", "-c"]
    args: ["while true; do echo 'Error: Unauthorized to fetch metrics'; sleep 5; done"]

