# ==============================================================================
# QUESTION 7: Fix NetworkPolicy by Updating Pod Labels
# Description: Creates the default-deny and traffic policies, along with the 
#              3 misconfigured pods inside the 'q7' namespace.
# ==============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: q7
---
# 1. Default Deny-All NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: q7
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
# 2. NetworkPolicy: Allow frontend to backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: q7
spec:
  podSelector:
    matchLabels:
      role: backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          role: frontend
---
# 3. NetworkPolicy: Allow backend to database
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-db
  namespace: q7
spec:
  podSelector:
    matchLabels:
      role: db
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          role: backend
---
# 4. Frontend Pod
apiVersion: v1
kind: Pod
metadata:
  name: frontend
  namespace: q7
  labels:
    role: wrong-frontend
spec:
  containers:
  - name: web
    image: nginx:alpine
---
# 5. Backend Pod
apiVersion: v1
kind: Pod
metadata:
  name: backend
  namespace: q7
  labels:
    role: wrong-backend
spec:
  containers:
  - name: app
    image: nginx:alpine
---
# 6. Database Pod
apiVersion: v1
kind: Pod
metadata:
  name: database
  namespace: q7
  labels:
    role: wrong-db
spec:
  containers:
  - name: db
    image: redis:alpine
---
