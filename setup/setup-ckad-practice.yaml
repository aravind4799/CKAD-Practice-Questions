---
# ==============================================================================
# QUESTION 1: Create Secret from Hardcoded Variables
# Description: Deployment 'api-server' exists with hardcoded env vars.
# ==============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: q1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: q1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
      - name: server
        image: nginx:alpine
        env:
        - name: DB_USER
          value: "admin"
        - name: DB_PASS
          value: "Secret123!"

---
